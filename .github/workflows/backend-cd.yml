name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed

jobs:

  deploy:

    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:

      - name: Login to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        run: |
          echo "IMAGE=ghcr.io/${{ github.repository }}/backend:prod-${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV

      - name: Deploy container revision
        run: |
          az containerapp update \
            --name konradquiz-backend-dev \
            --resource-group konradquiz-rg \
            --image $IMAGE