spring:
  datasource:
    url: ${AZURE_SQL_URL}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      connection-timeout: 30000                  # 30s max wait for connection
      maximum-pool-size: 5                       # low — Azure free tier has limits
      minimum-idle: 1                            # scale to zero when idle = save cost
      idle-timeout: 600000                       # 10min before idle connection closed
      max-lifetime: 1800000                      # 30min max connection lifetime
  jpa:
    hibernate:
      ddl-auto: validate                         # never auto-modify schema in prod
    show-sql: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  encryption:
    secret-key: ${ENCRYPTION_SECRET_KEY}
  admin:
    password: ${ADMIN_PASSWORD}

logging:
  level:
    com.konrad.konradquiz: INFO
    org.hibernate.SQL: WARN